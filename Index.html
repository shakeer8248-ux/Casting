<!DOCTYPE html>
<html>
<head>
    <title>Short-Code Cast</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; min-width: 300px; }
        #tv-id { font-size: 3em; color: #00ffcc; display: block; margin: 10px 0; }
        .hidden { display: none; }
        video { width: 100%; max-width: 600px; border-radius: 10px; margin-top: 15px; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 80%; }
        button { padding: 12px 24px; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="selection">
        <h1>Web Cast</h1>
        <button onclick="setupTV()">I AM TV</button>
        <button onclick="setupMobile()">I AM MOBILE</button>
    </div>

    <div id="tv-ui" class="hidden">
        <h2>TV Code</h2>
        <strong id="tv-id">Creating...</strong>
        <p>Waiting for Mobile...</p>
        <video id="player" controls autoplay></video>
    </div>

    <div id="mobile-ui" class="hidden">
        <h2>Mobile Controller</h2>
        <input type="number" id="target-id" placeholder="Enter 4-Digit TV Code">
        <br>
        <input type="file" id="video-file" accept="video/*">
        <br>
        <button onclick="startCast()" id="cast-btn">CAST NOW</button>
        <p id="m-status"></p>
    </div>

    <script>
        let peer;

        function setupTV() {
            document.getElementById('selection').classList.add('hidden');
            document.getElementById('tv-ui').classList.remove('hidden');

            // Generate a random 4-digit number for the ID
            const shortId = Math.floor(1000 + Math.random() * 9000).toString();
            
            // Connect to PeerJS using that specific short ID
            peer = new Peer(shortId);

            peer.on('open', (id) => {
                document.getElementById('tv-id').innerText = id;
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    const blob = new Blob([data.file], { type: data.type });
                    document.getElementById('player').src = URL.createObjectURL(blob);
                });
            });

            peer.on('error', (err) => {
                // If the ID is taken, just refresh
                if(err.type === 'unavailable-id') location.reload();
            });
        }

        function setupMobile() {
            document.getElementById('selection').classList.add('hidden');
            document.getElementById('mobile-ui').classList.remove('hidden');
            peer = new Peer(); // Mobile can have a random ID
        }

        function startCast() {
            const code = document.getElementById('target-id').value;
            const file = document.getElementById('video-file').files[0];
            const btn = document.getElementById('cast-btn');

            if(!code || !file) return alert("Enter Code & Select Video");

            btn.innerText = "Connecting...";
            const conn = peer.connect(code, { reliable: true });

            conn.on('open', () => {
                btn.innerText = "Sending Data...";
                conn.send({ file: file, type: file.type });
                btn.innerText = "Casting!";
            });

            conn.on('error', (err) => {
                alert("Fail: " + err);
                btn.innerText = "CAST NOW";
            });
        }
    </script>
</body>
</html>
