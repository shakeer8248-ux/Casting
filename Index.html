<!DOCTYPE html>
<html>
<head>
    <title>Universal Browser Cast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.3.1/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: sans-serif; }
        .btn { padding: 20px; width: 80%; margin: 10px; font-size: 1.2rem; border-radius: 10px; border: none; }
        #tv-id { font-size: 3rem; color: yellow; font-weight: bold; margin: 10px; }
        video { width: 100%; max-height: 70vh; background: #111; margin-top: 10px; }
        .hidden { display: none; }
        input { padding: 15px; width: 80%; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="selection">
        <h1>Select Device</h1>
        <button class="btn" style="background:#e50914; color:white;" onclick="setupTV()">I AM TV</button>
        <button class="btn" style="background:#007bff; color:white;" onclick="setupMobile()">I AM MOBILE</button>
    </div>

    <div id="tv-ui" class="hidden">
        <h2>TV CODE</h2>
        <div id="tv-id">Connecting...</div>
        <p id="tv-status">Generating code for old browser...</p>
        <video id="player" controls autoplay></video>
    </div>

    <div id="mobile-ui" class="hidden">
        <h2>MOBILE REMOTE</h2>
        <input type="text" id="target-id" placeholder="Enter TV Code">
        <br>
        <p>Pick Video from Gallery:</p>
        <input type="file" id="file-input" accept="video/*">
        <br>
        <button class="btn" style="background:#28a745; color:white;" onclick="connectAndCast()">CAST NOW</button>
        <p id="m-status"></p>
    </div>

    <script>
        var peer = null;

        function setupTV() {
            document.getElementById('selection').className = 'hidden';
            document.getElementById('tv-ui').className = '';

            // Using older PeerJS config for better compatibility
            peer = new Peer();

            peer.on('open', function(id) {
                document.getElementById('tv-id').innerText = id;
                document.getElementById('tv-status').innerText = "Ready! Waiting for mobile...";
            });

            peer.on('connection', function(conn) {
                document.getElementById('tv-status').innerText = "Receiving Video...";
                conn.on('data', function(data) {
                    var blob = new Blob([data.file], { type: data.type });
                    var videoUrl = URL.createObjectURL(blob);
                    var player = document.getElementById('player');
                    player.src = videoUrl;
                    player.play();
                });
            });

            peer.on('error', function(err) {
                document.getElementById('tv-id').innerText = "Error";
                document.getElementById('tv-status').innerText = "Refresh and try again.";
            });
        }

        function setupMobile() {
            document.getElementById('selection').className = 'hidden';
            document.getElementById('mobile-ui').className = '';
            peer = new Peer();
        }

        function connectAndCast() {
            var targetId = document.getElementById('target-id').value;
            var file = document.getElementById('file-input').files[0];
            
            if (!targetId || !file) {
                alert("Please enter Code and select Video");
                return;
            }

            document.getElementById('m-status').innerText = "Connecting to TV...";
            var conn = peer.connect(targetId);

            conn.on('open', function() {
                document.getElementById('m-status').innerText = "Casting...";
                conn.send({
                    file: file,
                    type: file.type
                });
            });
        }
    </script>
</body>
</html>
