<!DOCTYPE html>
<html>
<head>
    <title>Quick Cast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.3.1/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #00ffcc; text-align: center; font-family: sans-serif; }
        .btn { padding: 15px; width: 80%; margin: 5px; font-size: 1.2rem; border-radius: 10px; }
        #id-view { font-size: 3rem; color: yellow; }
        video { width: 100%; background: #111; }
    </style>
</head>
<body>
    <div id="start">
        <button class="btn" style="background:red" onclick="run('tv')">TV</button>
        <button class="btn" style="background:blue" onclick="run('mobile')">MOBILE</button>
    </div>

    <div id="ui" style="display:none">
        <div id="id-view">Connecting...</div>
        <video id="v" controls autoplay playsinline></video>
        <div id="m" style="display:none">
            <input type="text" id="target" placeholder="Enter TV Code" style="padding:10px; width:70%"><br>
            <input type="file" id="f" accept="video/*"><br>
            <button class="btn" style="background:green" onclick="cast()">SEND</button>
        </div>
    </div>

    <script>
        var p;
        function run(role) {
            document.getElementById('start').style.display='none';
            document.getElementById('ui').style.display='block';
            
            // Generate a random 4-digit number for the ID
            var shortId = Math.floor(1000 + Math.random() * 9000).toString();
            p = new Peer(shortId);

            p.on('open', function(id) { document.getElementById('id-view').innerText = id; });

            if(role === 'tv') {
                p.on('connection', function(c) {
                    c.on('data', function(d) {
                        var player = document.getElementById('v');
                        var url = URL.createObjectURL(new Blob([d.file], {type: d.type}));
                        player.src = url;
                        // Android 5 Fix: Force a reload to show picture
                        player.load();
                        player.play();
                    });
                });
            } else {
                document.getElementById('m').style.display='block';
                document.getElementById('id-view').style.display='none';
            }
        }

        function cast() {
            var file = document.getElementById('f').files[0];
            var conn = p.connect(document.getElementById('target').value, {reliable: false});
            conn.on('open', function() {
                conn.send({file: file, type: file.type});
                alert("Casting...");
            });
        }
    </script>
</body>
</html>
